name: Go SDK CI

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  verify:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build and test
        run: go test ./...
